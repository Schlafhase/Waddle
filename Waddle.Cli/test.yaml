# multiple actions in one penguin will lead to unexpected behaviour
- Name: first sleep
  cmd: sleep 1

- name: Client command
  cmd: echo hellooooo client
  variable: test

- name: Use variable
  cmd: ${test}
  ignoreError: true

- name: Nushell command
  cmd: ls | select name
  ignoreError: true
  shell:
    - nu
    - -c

- name: Create text file
  serverCmd: mkdir -p /home/Linus/testing && echo hello from the nest > /home/Linus/testing/text.txt

- name: Retrieve text file
  receiveFile: /home/Linus/testing/text.txt
  destination: ./output/text.txt

- name: Modify text file
  cmd: echo helloo from the client >> ./output/text.txt

- name: some nesting :)
  children:
  - name: Send text file back
    sendFile: ./output/text.txt
    destination: /home/Linus/out/put/textmodified.txt

  - name: Read file
    serverCmd: cat /home/Linus/out/put/textmodified.txt

  - name: Receive folder
    receiveFolder: /home/Linus/out/put/
    destination: ./output

  - name: Send folder
    sendFolder: ./output/
    destination: /home/Linus/out/put2

  - name: Send compressed folder
    sendCompressed: ./output/
    destination: /home/Linus/out/put3

  - name: Sleep
    serverCmd: sleep 2

- name: Timeout
  cmd: sleep 20
  timeoutMs: 1000
  ignoreError: true

- name: Nested ignored error
  ignoreError: true
  children:
  - name: Throw
    error: hehehe i'm so evil

- name: sleep (again)
  cmd: sleep 2

- name: Nested from file
  workflow: nested/test

- name: conditional error false
  error: if you read this, something's not right
  ifFalsy: test # remember that test was set by the first penguin so it shouldn't be falsy

- name: conditional error true
  error: helloo
  ignoreError: true
  ifFalsy: test

- name: Nested Error
  children:
  - name: Custom error
    error: i crashed your app :)

- name: After error
  serverCmd: echo hi server
