# multiple actions in one penguin will lead to unexpected behaviour
- name: "Client command"
  cmd: "echo hello client"
- name: "Change directory"
  serverCmd: "cd /home"
- name: "Sleep"
  serverCmd: "sleep 2"
- name: "Run Server command"
  serverCmd: "pwd"
- name: "Error"
  serverCmd: "asdf"
  ignoreError: false
- name: "After error"
  serverCmd: "echo hi server"
