# multiple actions in one penguin will lead to unexpected behaviour
- name: "Client command"
  cmd: "echo hello client"

- name: "Create text file"
  serverCmd: "mkdir -p /home/Linus/testing && touch /home/Linus/testing/text.txt"

- name: "Retrieve text file"
  receiveFolder: "/home/Linus/testing"
  destination: "./output"

- name: "Remove old files"
  serverCmd: "rm -rf /home/Linus/Penguins"

- name: "Upload files"
  sendFolder: "../Penguins"
  destination: "/home/Linus/Penguins"

- name: "Sleep"
  serverCmd: "sleep 2"

- name: "Timeout"
  cmd: "sleep 20"
  timeoutMs: 1000
  ignoreError: true

- name: "Ignore Error"
  serverCmd: "asdf"
  ignoreError: true

- name: "sleep (again)"
  cmd: "sleep 2"

- name: "Error"
  serverCmd: "asdf"
  ignoreError: false

- name: "After error"
  serverCmd: "echo hi server"
