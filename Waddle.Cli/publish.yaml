- name: Publish Linux
  cmd: dotnet publish -r linux-x64 -p:PublishSingleFile=true --self-contained "true"

- name: Publish Windows
  cmd: dotnet publish -r win-x64 -p:PublishSingleFile=true --self-contained "true"

- name: Move binaries
  cmd: mv ./bin/Release/net10.0/linux-x64/publish/Waddle.Cli ./bin/Release/waddle 
       && mv ./bin/Release/net10.0/win-x64/publish/Waddle.Cli.exe ./bin/Release/waddle.exe
